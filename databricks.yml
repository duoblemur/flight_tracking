bundle:
  name: flight-analytics-platform


include:
  - resources/*.yml

variables:
  catalog:
    default: dbr_dev
  catalog_name:
    default: dbr_dev

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605185991044.4.azuredatabricks.net
    variables:
      catalog: dbr_dev

resources:
  pipelines:
    flight_silver_pipeline:
      name: "[${bundle.target}] Flight Silver DLT"
      # ВИПРАВЛЕНО: додано .value
      catalog: ${variables.catalog_name.value} 
      target: skybound_silver
      libraries:
        - notebook:
            path: ./src/dlt/flight_processing.ipynb
      clusters:
        - label: default
          autoscale:
            min_workers: 1
            max_workers: 2
      channel: PREVIEW
      continuous: true
      development: true

  jobs:
    flight_ingestion_job:
      name: "[${bundle.target}] Flight Ingestion & Silver"
      tasks:
        - task_key: ingest_bronze
          job_cluster_key: small_cluster
          notebook_task:
            notebook_path: ./src/producers/flights_producer.ipynb

        - task_key: transform_silver
          pipeline_task:
            pipeline_id: ${resources.pipelines.flight_silver_pipeline.id}

      job_clusters:
        - job_cluster_key: small_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: Standard_DS3_v2
            num_workers: 1

      continuous:
        pause_status: PAUSED # Зміни на UNPAUSED, якщо хочеш автозапуск

    vacuum_maintenance_job:
      name: "[${bundle.target}] Bronze Vacuum Maintenance"
      tasks:
        - task_key: vacuum_bronze
          job_cluster_key: maintenance_cluster
          notebook_task:
            notebook_path: ./src/notebooks/vacuum_bronze.ipynb

      job_clusters:
        - job_cluster_key: maintenance_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: Standard_DS3_v2
            num_workers: 0
            # ВИПРАВЛЕНО: обов'язкові параметри для Single Node (num_workers: 0)
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
              spark.databricks.delta.retentionDurationCheck.enabled: "false"
            custom_tags:
              ResourceClass: SingleNode

      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC

    weather_from_api:
      name: "Weather Ingestion & Silver Transformations"
      schedule:
        quartz_cron_expression: 0 0/15 * * * ?  # every 15 minutes
        timezone_id: UTC
      tasks:
        - task_key: bronze_producer_ingestion
          notebook_task:
            notebook_path: ./src/weather_processing/01_weather_producer.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          existing_cluster_id: 0211-145306-i704nq9e
        - task_key: silver_weather_transformations
          depends_on:
            - task_key: bronze_producer_ingestion
          notebook_task:
            notebook_path: ./src/weather_processing/02_weather_transformations.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          existing_cluster_id: 0211-145306-i704nq9e
      queue:
        enabled: true