bundle:
  name: flight-analytics-platform

include:
  - resources/*.yml

variables:
  catalog:
    default: dbr_dev

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605185991044.4.azuredatabricks.net
    variables:
      catalog: dbr_dev

resources:
  pipelines:
    flight_unified_pipeline:
      name: "[${bundle.target}] Unified Flight Pipeline"
      catalog: dbr_dev
      target: skybound_gold
      libraries:
        - notebook:
            path: ./src/dlt/flight_processing.ipynb 
        - notebook:
            path: ./src/dlt/flight_silver_gold_transform.ipynb
      clusters:
        - label: default
          num_workers: 0
          spark_conf:
            spark.databricks.cluster.profile: singleNode
            spark.master: "local[*]"
          custom_tags:
            ResourceClass: SingleNode
      continuous: false
      development: true

  jobs:
    flight_ingestion_job:
      tasks:
        - task_key: run_unified_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.flight_unified_pipeline.id}
            full_refresh: false

    vacuum_maintenance_job:
      name: "[${bundle.target}] Bronze Vacuum Maintenance"
      tasks:
        - task_key: vacuum_bronze
          job_cluster_key: maintenance_cluster
          notebook_task:
            notebook_path: ./src/notebooks/vacuum_bronze.ipynb

      job_clusters:
        - job_cluster_key: maintenance_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: Standard_DS3_v2
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
              spark.databricks.delta.retentionDurationCheck.enabled: "false"
            custom_tags:
              ResourceClass: SingleNode
            data_security_mode: SINGLE_USER

      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: PAUSED

    weather_processing_job:
      name: "[${bundle.target}] Weather Transformations & Aggregations"
      schedule:
        quartz_cron_expression: 0 0/30 * * * ?  # every 30 minutes
        timezone_id: UTC
      tasks:
        - task_key: silver_weather_transformations
          notebook_task:
            notebook_path: ./src/weather_job/01_silver_transformations.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          job_cluster_key: weather_job_cluster
        - task_key: gold_fact_weather_with_airports
          depends_on:
            - task_key: silver_weather_transformations
          notebook_task:
            notebook_path: ./src/weather_job/02_gold_fact_airport_weather_reports.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          job_cluster_key: weather_job_cluster
        - task_key: gold_agg_current_snapshot
          depends_on:
            - task_key: gold_fact_weather_with_airports
          notebook_task:
            notebook_path: ./src/weather_job/03_gold_agg_current_snapshot.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          job_cluster_key: weather_job_cluster
        - task_key: gold_agg_current_country
          depends_on:
            - task_key: gold_fact_weather_with_airports
          notebook_task:
            notebook_path: ./src/weather_job/04_gold_agg_country_current.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          job_cluster_key: weather_job_cluster
      job_clusters:
        - job_cluster_key: weather_job_cluster
          new_cluster:
            spark_version: 17.3.x-scala2.13
            node_type_id: Standard_F4
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            kind: CLASSIC_PREVIEW
            use_ml_runtime: false
            is_single_node: true
      
      queue:
        enabled: true

