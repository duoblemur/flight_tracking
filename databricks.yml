bundle:
  name: flight-analytics-platform

include:
  - resources/*.yml

variables:
  catalog:
    default: dbr_dev
  catalog_name:
    default: dbr_dev

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605185991044.4.azuredatabricks.net
    variables:
      catalog: dbr_dev

resources:
  pipelines:
    flight_unified_pipeline:
      name: "[${bundle.target}] Unified Flight Pipeline"
      catalog: dbr_dev
      target: skybound_gold
      libraries:
        - notebook:
            path: ./src/dlt/flight_processing.ipynb 
        - notebook:
            path: ./src/dlt/flight_silver_gold_transform.ipynb
      clusters:
        - label: default
          num_workers: 0
          spark_conf:
            spark.databricks.cluster.profile: singleNode
            spark.master: "local[*]"
          custom_tags:
            ResourceClass: SingleNode
      continuous: false
      development: true

  jobs:
    flight_ingestion_job:
      tasks:
        - task_key: run_unified_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.flight_unified_pipeline.id}
            full_refresh: false

    vacuum_maintenance_job:
      name: "[${bundle.target}] Bronze Vacuum Maintenance"
      tasks:
        - task_key: vacuum_bronze
          job_cluster_key: maintenance_cluster
          notebook_task:
            notebook_path: ./src/notebooks/vacuum_bronze.ipynb

      job_clusters:
        - job_cluster_key: maintenance_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: Standard_DS3_v2
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
              spark.databricks.delta.retentionDurationCheck.enabled: "false"
            custom_tags:
              ResourceClass: SingleNode
            data_security_mode: SINGLE_USER

      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: PAUSED
