resources:
  jobs:
    weather_from_api:
      name: weather_from_api
      schedule:
        quartz_cron_expression: 0 0/15 * * * ?  # every 15 minutes
        timezone_id: UTC
      tasks:
        - task_key: bronze_producer_ingestion
          notebook_task:
            notebook_path: ../src/weather_from_api/01_weather_producer.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          existing_cluster_id: 0211-145306-i704nq9e
        - task_key: silver_weather_transformations
          depends_on:
            - task_key: bronze_producer_ingestion
          notebook_task:
            notebook_path: ../src/weather_from_api/02_weather_transformations.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          existing_cluster_id: 0211-145306-i704nq9e
      queue:
        enabled: true